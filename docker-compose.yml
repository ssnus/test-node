version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: test-node-server
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - PORT=3001
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: test-node-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
